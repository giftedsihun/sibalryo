<svg xmlns="http://www.w3.org/2000/svg" width="400" height="700" viewBox="0 0 400 700">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFB3CE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="700" fill="url(#bg)"/>
  <!-- Body -->
  <rect x="130" y="280" width="140" height="200" rx="10" fill="#1a1a2e"/>
  <rect x="150" y="275" width="100" height="20" rx="5" fill="#FF6B9D"/>
  <!-- Head -->
  <ellipse cx="200" cy="200" rx="80" ry="90" fill="#FFD4A8"/>
  <!-- Pink hair -->
  <ellipse cx="200" cy="155" rx="85" ry="60" fill="#FF6B9D"/>
  <rect x="115" y="155" width="30" height="80" rx="15" fill="#FF6B9D"/>
  <rect x="255" y="155" width="30" height="80" rx="15" fill="#FF6B9D"/>
  <!-- Glasses -->
  <rect x="160" y="195" width="35" height="22" rx="8" fill="none" stroke="#555" stroke-width="2.5"/>
  <rect x="205" y="195" width="35" height="22" rx="8" fill="none" stroke="#555" stroke-width="2.5"/>
  <line x1="195" y1="206" x2="205" y2="206" stroke="#555" stroke-width="2"/>
  <!-- Eyes -->
  <ellipse cx="178" cy="206" rx="10" ry="8" fill="#3D2B1F"/>
  <ellipse cx="222" cy="206" rx="10" ry="8" fill="#3D2B1F"/>
  <circle cx="181" cy="203" r="3" fill="white"/>
  <circle cx="225" cy="203" r="3" fill="white"/>
  <!-- Mouth -->
  <path d="M188 235 Q200 245 212 235" stroke="#c87" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Name -->
  <text x="200" y="670" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#FF6B9D" font-weight="bold">하루</text>
